<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">


<a href="dashboard.html" class="btn btn-secondary mb-3">Volver</a>

<form id="formProducto" class="mb-4">
    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>

    <input type="number" id="precio" class="form-control mb-2" placeholder="Precio" required>

    <input type="number" id="stock" class="form-control mb-2" placeholder="Stock" required>

    <input type="text" id="categoria" class="form-control mb-2" placeholder="Categoría" required>

    <button type="submit" class="btn btn-success">
        Guardar producto
    </button>
</form>

<button onclick="restaurarProducto(1)">Restaurar producto </button>

<h2>Lista de productos</h2>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody id="tablaProductos"></tbody>
</table>

<script src="js/productos.js"></script>
</body>
</html>

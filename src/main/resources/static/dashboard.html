<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4">Bienvenido a SmartP</h1>

<div class="mb-3">

    <button onclick="logout()" class="btn btn-danger me-2">
        Cerrar sesión
    </button>

</div>

<div>

    <a href="productos.html" class="btn btn-primary me-2">
        Ver productos
    </a>

    <a href="clientes.html" class="btn btn-success me-2">
        Ver clientes
    </a>

    <a href="ventas.html" class="btn btn-warning me-2">
        Registrar venta
    </a>

    <a href="historial.html" class="btn btn-dark">
        Historial de Ventas
    </a>

</div>

<div class="row mt-4">

        <div class="col-md-3">
            <div class="card text-bg-primary mb-3">
                <div class="card-body">
                    <h5>Total Ventas</h5>
                    <h2 id="totalVentas">$0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-success mb-3">
                <div class="card-body">
                    <h5>Total Clientes</h5>
                    <h2 id="totalClientes">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-warning mb-3">
                <div class="card-body">
                    <h5>Total Productos</h5>
                    <h2 id="totalProductos">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-danger mb-3">
                <div class="card-body">
                    <h5>Stock Bajo</h5>
                    <h2 id="stockBajo">0</h2>
                </div>
            </div>
        </div>

    </div>

    <script src="js/dashboard.js"></script>


<script>

    const token = localStorage.getItem("token");

    if (!token) {

        window.location.href = "login.html";
    }

    function logout() {

        localStorage.removeItem("token");

        window.location.href = "login.html";
    }

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h1 class="mb-4">Registrar Venta</h1>

<div class="mb-3">
    <label>Cliente</label>

    <select id="clienteSelect" class="form-select">

    </select>
</div>

<div class="row">

    <div class="col-md-5">

        <label>Producto</label>

        <select id="productoSelect" class="form-select">

        </select>
    </div>

    <div class="col-md-3">

        <label>Cantidad</label>

        <input type="number" id="cantidad" class="form-control" min="1">
    </div>

    <div class="col-md-2 d-flex align-items-end">

        <button id="btnAgregar" class="btn btn-primary w-100">
            Agregar
        </button>
    </div>

</div>

<h3 class="mt-4">Carrito</h3>

<table class="table table-bordered">

    <thead class="table-dark">
    <tr>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Subtotal</th>
        <th>Acciones</th>
    </tr>

    </thead>

    <tbody id="tablaCarrito"></tbody>

</table>

<h4 id="totalVenta">Total: $0</h4>

<button id="btnGuardarVenta" class="btn btn-success">
    Guardar Venta
</button>

<script src="js/ventas.js"></script>

</body>
</html>
